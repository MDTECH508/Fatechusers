<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake YT Tech - Nitro Proxy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle at center, #0f172a, #020617);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }
        .glow-cyan { box-shadow: 0 0 20px rgba(6, 182, 212, 0.5); }
    </style>
</head>
<body class="p-4">

    <div class="glass glow-cyan w-full max-w-md p-8">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-black tracking-widest text-cyan-400">FAKE YT TECH</h1>
            <p class="text-gray-400 text-xs uppercase mt-1">Gamer Proxy System</p>
        </div>

        <!-- Seksyon Aktivasyon -->
        <div id="activation-area">
            <div class="mb-4">
                <label class="block text-[10px] text-gray-500 mb-1 uppercase font-bold">License Key (FAKE-XXXX)</label>
                <input id="user-key" type="text" placeholder="FAKE-XXXX-XXXX" 
                    class="w-full bg-black/40 border border-white/10 p-3 rounded-xl outline-none focus:border-cyan-500 text-center font-mono">
            </div>
            <button onclick="checkKey()" class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-black py-4 rounded-xl transition uppercase tracking-tighter">
                Aktive Sèvis la
            </button>
        </div>

        <!-- Seksyon Detay (Hidden) -->
        <div id="details-area" class="hidden space-y-4">
            <div class="p-4 bg-green-500/10 border border-green-500/30 rounded-xl text-center">
                <span class="text-green-400 font-bold">✓ AKSÈ AKTIF</span>
                <div id="timer" class="text-2xl font-mono mt-1">23:59:59</div>
            </div>
            
            <div class="space-y-2">
                <div class="flex justify-between p-3 bg-white/5 rounded-lg border border-white/10">
                    <span class="text-gray-400 text-xs">Sèvè IP:</span>
                    <span class="font-bold">103.218.123.239</span>
                </div>
                <div class="flex justify-between p-3 bg-white/5 rounded-lg border border-white/10">
                    <span class="text-gray-400 text-xs">Pò HTTP:</span>
                    <span class="font-bold">9999</span>
                </div>
            </div>

            <!-- Bouton Download Sètifika -->
            <a href="FakeXsensi.mobileconfig" class="block w-full text-center py-3 border border-cyan-500/50 text-cyan-400 rounded-xl text-sm font-bold hover:bg-cyan-500/10">
                📥 Telechaje Sètifika FakeXsensi
            </a>
        </div>
    </div>

    <script>
        function checkKey() {
            const key = document.getElementById('user-key').value;
            if(key.startsWith("FAKE-")) {
                document.getElementById('activation-area').classList.add('hidden');
                document.getElementById('details-area').classList.remove('hidden');
                startTimer(86400); 
            } else {
                alert("Kle sa a pa valid! Li dwe kòmanse ak FAKE-");
            }
        }

        function startTimer(sec) {
            setInterval(() => {
                let h = Math.floor(sec / 3600);
                let m = Math.floor((sec % 3600) / 60);
                let s = sec % 60;
                document.getElementById('timer').innerText = 
                    `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                if (sec > 0) sec--;
            }, 1000);
        }
    </script>
</body>
</html>
