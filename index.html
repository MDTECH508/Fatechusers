<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fakeXproxy - Admin Panel | License Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background: #0a0c15;
            padding: 2rem;
            min-height: 100vh;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .admin-header {
            background: linear-gradient(135deg, #1e1b4b, #0f172a);
            border-radius: 1.5rem;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .admin-title {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a855f7, #ec4899, #fbbf24);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .admin-sub {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: #1e293b;
            border-radius: 1rem;
            padding: 1.2rem;
            border: 1px solid #334155;
            transition: all 0.3s;
        }

        .stat-card:hover {
            border-color: #a855f7;
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: #a855f7;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Generate Section */
        .generate-section {
            background: #1e293b;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #334155;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            color: #e2e8f0;
        }

        .days-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }

        .day-btn {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            color: #cbd5e1;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .day-btn:hover {
            border-color: #a855f7;
            color: #a855f7;
        }

        .day-btn.active {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border-color: transparent;
            color: white;
        }

        .generate-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
            margin-top: 1rem;
        }

        .input-field {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 0.6rem 1rem;
            color: white;
        }

        .input-field:focus {
            outline: none;
            border-color: #a855f7;
        }

        .btn {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(124,58,237,0.4);
        }

        .btn-danger {
            background: #dc2626;
            color: white;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        .btn-warning {
            background: #eab308;
            color: #0f172a;
        }

        .btn-success {
            background: #22c55e;
            color: white;
        }

        /* Copy All Section */
        .copy-all-section {
            background: #0f172a;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .copy-all-btn {
            background: #2d374b;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.8rem;
        }

        /* Table */
        .table-container {
            background: #1e293b;
            border-radius: 1.5rem;
            overflow-x: auto;
            border: 1px solid #334155;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 1rem;
            background: #0f172a;
            color: #cbd5e1;
            font-weight: 600;
            font-size: 0.75rem;
            border-bottom: 1px solid #334155;
        }

        td {
            padding: 0.8rem 1rem;
            border-bottom: 1px solid #334155;
            color: #e2e8f0;
            font-size: 0.8rem;
        }

        tr:hover {
            background: #334155;
        }

        .key-code {
            font-family: monospace;
            font-weight: 600;
            color: #c084fc;
        }

        .copy-key-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            padding: 0.2rem 0.5rem;
            border-radius: 0.4rem;
            color: #94a3b8;
            transition: all 0.2s;
        }

        .copy-key-btn:hover {
            background: #475569;
            color: #c084fc;
        }

        .status-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 50px;
            font-size: 0.65rem;
            font-weight: 600;
        }

        .status-active {
            background: #22c55e20;
            color: #22c55e;
            border: 1px solid #22c55e40;
        }

        .status-inactive {
            background: #ef444420;
            color: #ef4444;
            border: 1px solid #ef444440;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            margin: 0 0.2rem;
            padding: 0.2rem 0.4rem;
            border-radius: 0.4rem;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: #475569;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            border-left: 4px solid #22c55e;
            padding: 0.8rem 1.2rem;
            border-radius: 0.5rem;
            color: white;
            font-size: 0.85rem;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            th, td {
                padding: 0.5rem;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <div class="admin-title">🔐 fakeXproxy - ADMIN PANEL</div>
            <div class="admin-sub">Manage SSL Certificates • License Keys • Expiry Control</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalKeys">0</div>
                <div class="stat-label">Total Keys</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="activeKeys">0</div>
                <div class="stat-label">Active Keys</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="boundKeys">0</div>
                <div class="stat-label">IP Bound</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="expiredKeys">0</div>
                <div class="stat-label">Expired Keys</div>
            </div>
        </div>

        <div class="generate-section">
            <div class="section-title">🔑 Generate License Keys</div>
            
            <div class="days-buttons">
                <button class="day-btn" data-days="1">📅 1 Day</button>
                <button class="day-btn" data-days="7">📅 7 Days</button>
                <button class="day-btn active" data-days="30">📅 30 Days</button>
            </div>

            <div class="generate-controls">
                <div>
                    <label style="font-size:0.7rem; color:#94a3b8;">QUANTITY</label>
                    <input type="number" id="genQuantity" class="input-field" value="1" min="1" max="20" style="width:80px">
                </div>
                <button class="btn btn-primary" id="generateBtn">✨ Generate Keys</button>
                <button class="btn btn-warning" id="refreshBtn">🔄 Refresh</button>
                <button class="btn btn-danger" id="clearAllBtn">🗑 Clear All</button>
            </div>
        </div>

        <div class="copy-all-section">
            <span style="color:#94a3b8; font-size:0.8rem;">📋 Copy all active keys at once</span>
            <button class="btn btn-success copy-all-btn" id="copyAllKeysBtn">📋 Copy All Keys</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>License Key</th>
                        <th>Status</th>
                        <th>Expiry Date</th>
                        <th>Bound IP</th>
                        <th>Activated At</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="keysTableBody">
                    <tr>
                        <td colspan="6" style="text-align:center;">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'fake_proxy_licenses';
        let selectedDays = 30;

        function randomSegment(len = 4) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = '';
            for (let i = 0; i < len; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        function generateLicenseKey() {
            const part1 = randomSegment(4);
            const part2 = randomSegment(4);
            return `FAKE-${part1}-${part2}`;
        }

        function getExpiryDate(daysFromNow) {
            const date = new Date();
            date.setDate(date.getDate() + daysFromNow);
            return `${date.getMonth()+1}/${date.getDate()}/${date.getFullYear()}`;
        }

        function loadLicenses() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                return JSON.parse(stored);
            }
            return [];
        }

        function saveLicenses(licenses) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(licenses));
        }

        function generateKeys(count, days) {
            const licenses = loadLicenses();
            const newKeys = [];
            
            for (let i = 0; i < count; i++) {
                let newKey;
                let exists = true;
                do {
                    newKey = generateLicenseKey();
                    exists = licenses.some(lic => lic.key === newKey);
                } while (exists);
                
                newKeys.push({
                    key: newKey,
                    status: 'active',
                    expiryDate: getExpiryDate(days),
                    boundIP: null,
                    activatedAt: null
                });
            }
            
            const updated = [...licenses, ...newKeys];
            saveLicenses(updated);
            renderTable();
            updateStats();
            showToast(`✅ ${count} key(s) generated (${days} days expiry)`);
        }

        function deleteKey(keyToDelete) {
            const licenses = loadLicenses();
            const filtered = licenses.filter(lic => lic.key !== keyToDelete);
            saveLicenses(filtered);
            renderTable();
            updateStats();
            showToast(`🗑 Key deleted`);
        }

        function toggleStatus(key) {
            const licenses = loadLicenses();
            const license = licenses.find(lic => lic.key === key);
            if (license) {
                license.status = license.status === 'active' ? 'inactive' : 'active';
                saveLicenses(licenses);
                renderTable();
                updateStats();
                showToast(`📌 Key is now ${license.status}`);
            }
        }

        function unbindIP(key) {
            const licenses = loadLicenses();
            const license = licenses.find(lic => lic.key === key);
            if (license) {
                license.boundIP = null;
                saveLicenses(licenses);
                renderTable();
                updateStats();
                showToast(`🔓 IP unbinded from ${key}`);
            }
        }

        function clearAllKeys() {
            if (confirm('⚠️ Delete ALL license keys? This action is permanent!')) {
                saveLicenses([]);
                renderTable();
                updateStats();
                showToast('🗑 All licenses deleted');
            }
        }

        function copyAllKeys() {
            const licenses = loadLicenses();
            const activeKeys = licenses.filter(l => l.status === 'active');
            if (activeKeys.length === 0) {
                showToast('❌ No active keys to copy');
                return;
            }
            const keysText = activeKeys.map(l => l.key).join('\n');
            navigator.clipboard.writeText(keysText);
            showToast(`📋 Copied ${activeKeys.length} key(s) to clipboard`);
        }

        function copySingleKey(key) {
            navigator.clipboard.writeText(key);
            showToast(`📋 Copied: ${key}`);
        }

        function updateStats() {
            const licenses = loadLicenses();
            const total = licenses.length;
            const today = new Date();
            const active = licenses.filter(l => {
                if (l.status !== 'active') return false;
                const expiryParts = l.expiryDate.split('/');
                const expiryDate = new Date(expiryParts[2], expiryParts[0]-1, expiryParts[1]);
                return expiryDate >= today;
            }).length;
            const bound = licenses.filter(l => l.boundIP).length;
            const expired = licenses.filter(l => {
                if (l.status !== 'active') return false;
                const expiryParts = l.expiryDate.split('/');
                const expiryDate = new Date(expiryParts[2], expiryParts[0]-1, expiryParts[1]);
                return expiryDate < today;
            }).length;
            
            document.getElementById('totalKeys').textContent = total;
            document.getElementById('activeKeys').textContent = active;
            document.getElementById('boundKeys').textContent = bound;
            document.getElementById('expiredKeys').textContent = expired;
        }

        function renderTable() {
            const licenses = loadLicenses();
            const tbody = document.getElementById('keysTableBody');
            
            if (licenses.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No licenses yet. Generate some!</td></tr>';
                return;
            }
            
            const today = new Date();
            tbody.innerHTML = licenses.map(lic => {
                const expiryParts = lic.expiryDate.split('/');
                const expiryDate = new Date(expiryParts[2], expiryParts[0]-1, expiryParts[1]);
                const isExpired = expiryDate < today;
                const displayStatus = lic.status === 'active' && !isExpired ? 'active' : 'inactive';
                
                return `
                    <tr>
                        <td class="key-code">
                            ${lic.key}
                            <button class="copy-key-btn" onclick="copySingleKey('${lic.key}')" title="Copy key">📋</button>
                        </td>
                        <td><span class="status-badge ${displayStatus === 'active' ? 'status-active' : 'status-inactive'}">${displayStatus.toUpperCase()}</span></td>
                        <td>${lic.expiryDate}${isExpired && lic.status === 'active' ? ' ⚠️ EXPIRED' : ''}</td>
                        <td>${lic.boundIP || '— Not bound —'}</td>
                        <td>${lic.activatedAt || '—'}</td>
                        <td>
                            <button class="action-btn" onclick="toggleStatus('${lic.key}')" title="Toggle Status">🔄</button>
                            <button class="action-btn" onclick="unbindIP('${lic.key}')" title="Unbind IP">🔓</button>
                            <button class="action-btn" onclick="deleteKey('${lic.key}')" title="Delete">🗑</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.remove(), 3000);
        }

        // Event Listeners
        document.querySelectorAll('.day-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedDays = parseInt(btn.getAttribute('data-days'));
            });
        });

        document.getElementById('generateBtn').addEventListener('click', () => {
            const qty = parseInt(document.getElementById('genQuantity').value) || 1;
            generateKeys(Math.min(qty, 20), selectedDays);
        });
        
        document.getElementById('refreshBtn').addEventListener('click', () => {
            renderTable();
            updateStats();
            showToast('🔄 Refreshed');
        });
        
        document.getElementById('clearAllBtn').addEventListener('click', clearAllKeys);
        document.getElementById('copyAllKeysBtn').addEventListener('click', copyAllKeys);
        
        // Make functions global for onclick
        window.copySingleKey = copySingleKey;
        window.deleteKey = deleteKey;
        window.toggleStatus = toggleStatus;
        window.unbindIP = unbindIP;
        
        renderTable();
        updateStats();
    </script>
</body>
</html>
