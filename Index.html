    <script>
        function validateKey() {
            const keyVal = document.getElementById('input-key').value.trim();
            const db = JSON.parse(localStorage.getItem('fake_yt_database')) || [];
            const kounya = new Date().getTime();

            const match = db.find(k => k.id === keyVal);

            if(match) {
                if(kounya < match.expireAt) {
                    document.getElementById('user-auth').classList.add('hidden');
                    document.getElementById('user-details').classList.remove('hidden');
                    
                    const timeSec = Math.floor((match.expireAt - kounya) / 1000);
                    runTimer(timeSec);
                } else { alert("Kle sa a ekspire!"); }
            } else { alert("Kle sa a pa egziste nan sistèm nan!"); }
        }

        function runTimer(sec) {
            const disp = document.getElementById('timer-display');
            const interval = setInterval(() => {
                let h = Math.floor(sec / 3600);
                let m = Math.floor((sec % 3600) / 60);
                let s = sec % 60;
                disp.textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                if(sec <= 0) { clearInterval(interval); location.reload(); }
                sec--;
            }, 1000);
        }
