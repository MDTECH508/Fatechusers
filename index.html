  <!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAKE YT TECH - Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at center, #0f172a, #020617); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-6">

    <div class="glass w-full max-w-sm p-10 border-cyan-500/20 text-center">
        <h1 class="text-4xl font-black text-cyan-400 mb-10 italic tracking-tighter">FAKE YT TECH</h1>

        <div id="auth-ui">
            <input id="ukey" type="text" placeholder="FAKE-XX-XXXXXX" 
                class="w-full bg-black/50 border border-white/10 p-5 rounded-2xl outline-none focus:border-cyan-500 text-center font-mono tracking-widest uppercase mb-6">
            <button onclick="verifyAndActivate()" class="w-full bg-cyan-500 p-5 rounded-2xl text-black font-black uppercase tracking-widest shadow-lg shadow-cyan-500/20">
                Aktive Sèvis
            </button>
        </div>

        <div id="active-ui" class="hidden space-y-6">
            <div class="p-6 bg-cyan-500/10 border border-cyan-500/30 rounded-3xl">
                <span class="text-cyan-400 text-xs font-black uppercase">Aksè Valid ✅</span>
                <div id="timer" class="text-3xl font-mono font-black mt-2">--:--:--</div>
            </div>
            <div class="text-[10px] text-gray-500 uppercase font-bold">Server: 103.218.123.239</div>
            <a href="FakeXsensi.mobileconfig" class="block w-full py-4 bg-white/5 border border-white/10 rounded-2xl text-xs font-bold hover:bg-cyan-500/10 transition">
                📥 Sètifika FakeXsensi (iOS)
            </a>
        </div>
    </div>

    <script>
        const SECURITY_SALT = "FAKE_YT_2026_MASTER_SECRET"; // DWE PAREIL AK ADMIN

        function verifyAndActivate() {
            const key = document.getElementById('ukey').value.trim().toUpperCase();
            
            try {
                const parts = key.split("-"); // [FAKE, 1D, SIGNATURE]
                if (parts.length !== 3 || parts[0] !== "FAKE") {
                    alert("Kle Aktivasyon Envalid!");
                    return;
                }

                const daysStr = parts[1].replace("D", "");
                const signatureProvided = parts[2];

                // VERIFIKASYON MATEMATIK (Re-calculate signature)
                const checkData = SECURITY_SALT + daysStr + "VALID";
                const expectedSignature = btoa(checkData).substring(2, 10).toUpperCase();

                if (signatureProvided === expectedSignature) {
                    const days = parseInt(daysStr);
                    const expiry = Date.now() + (days * 24 * 60 * 60 * 1000);
                    
                    localStorage.setItem('fake_expiry', expiry);
                    startSession(expiry);
                } else {
                    alert("Kòd Siyati a pa kòrèk!");
                }
            } catch (e) {
                alert("Erè nan sistèm verifikasyon an.");
            }
        }

        function startSession(expiry) {
            document.getElementById('auth-ui').classList.add('hidden');
            document.getElementById('active-ui').classList.remove('hidden');
            
            setInterval(() => {
                const now = Date.now();
                const diff = expiry - now;
                if (diff <= 0) { localStorage.clear(); location.reload(); return; }
                
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        window.onload = () => {
            const saved = localStorage.getItem('fake_expiry');
            if (saved && Date.now() < parseInt(saved)) startSession(parseInt(saved));
        };
    </script>
</body>
</html>
